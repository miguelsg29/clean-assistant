name: "Clean Assistant"
version: "0.16.3"
slug: "clean_assistant"
description: "Interfaz local (sin nube) para el Conga 8090 Ultra: mapa en vivo, habitaciones, zonas, horarios y MQTT."
url: "https://github.com/miguelsg29/clean-assistant"
arch:
  - aarch64
  - amd64
  - armv7
init: false
# La interfaz web se abre desde la barra lateral de Home Assistant (ingress).
ingress: true
ingress_port: 8099
panel_icon: "mdi:robot-vacuum"
# El robot se conecta a este puerto (redirige el DNS tcp-cecotec.3irobotix.net a HA).
ports:
  9090/tcp: 9090
# Descubrimiento del broker MQTT de Home Assistant (Mosquitto): si no rellenas los
# campos MQTT_* a mano, se autoconfiguran desde HA. "want" = opcional (la app funciona
# igual sin MQTT).
services:
  - mqtt:want
options:
  ROBOT_DID: 0
  ROBOT_USERID: 0
  ROBOT_SN: "PON_AQUI_EL_SN_DE_TU_ROBOT"
  ROBOT_MAC: "00:00:00:00:00:00"
  FACTORY_ID: "1003"
  PROJECT_TYPE: "CECOTECCRL350-1001"
  MQTT_HOST: ""
  MQTT_PORT: 1883
  MQTT_USER: ""
  MQTT_PASS: ""
  AUTH_JWT: ""
  DEFAULT_FAN: "Normal"
  DEFAULT_WATER: "Medio"
  DEFAULT_MOP: "Estándar"
schema:
  ROBOT_DID: int
  ROBOT_USERID: int
  ROBOT_SN: str
  ROBOT_MAC: str
  FACTORY_ID: str
  PROJECT_TYPE: str
  MQTT_HOST: str?
  MQTT_PORT: int
  MQTT_USER: str?
  MQTT_PASS: password?
  AUTH_JWT: str?
  DEFAULT_FAN: list(Off|Eco|Normal|Turbo)
  DEFAULT_WATER: list(Off|Bajo|Medio|Alto)
  DEFAULT_MOP: list(Off|Estándar|Fuerte|Potente)
